<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0c12" />
  <meta name="application-name" content="TheCrosswordThing" />
  <title>TheCrosswordThing</title>
  <link rel="stylesheet" href="/css/theme.css" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="glow-orbs" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">TC</span>
      <div class="brand-text">
        <span class="brand-title">TheCrosswordThing</span>
        <span class="brand-tag">English gameday · race mode</span>
      </div>
    </div>
    <div class="topbar-actions" id="topbar-actions"></div>
  </header>

  <main id="app" class="app"></main>

  <footer class="foot">
    <p class="foot-note">
      Local: <code>npm run go</code> then use the Network URL from the terminal. Internet: deploy to Vercel, add the <strong>Upstash Redis</strong> integration (env <code>UPSTASH_REDIS_REST_URL</code> and <code>UPSTASH_REDIS_REST_TOKEN</code>), then open your production URL anywhere.
    </p>
  </footer>

  <div id="toast-stack" class="toast-stack" aria-live="polite"></div>

  <script defer src="/js/app.js"></script>
</body>
</html>
